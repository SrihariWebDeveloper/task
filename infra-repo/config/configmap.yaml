apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-platform
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  REDIS_URL: "redis://redis:6379"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  MONGO_DB: "taskdb"
  BACKEND_PORT: "5000"
  FRONTEND_API_BASE: "/api"
