apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-platform
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-platform
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-platform
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: sriharidev07/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: NODE_ENV
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: REDIS_URL
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
