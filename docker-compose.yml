version: '3.8'
services:
  redis:
    image: redis:7.2
    ports:
      - '6379:6379'
    restart: unless-stopped

  backend:
    build: ./server
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./worker
    env_file:
      - ./worker/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./client
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
